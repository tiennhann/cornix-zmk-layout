draw_config:
  svg_extra_style: |
    /* Target layer: the auto-detected "held" activator key gets an amber fill
       (overrides keymap-drawer's default red #fdd). This shows, on each layer,
       which key you hold to keep that layer active. */
    rect.held, rect.combo.held {
        fill: #ffd166;
    }
    /* Base layer: legends of keys that activate a layer (Symbol/Nav/...) are
       drawn in bold amber so the entry points stand out on the Base map too.
       (A full key fill here isn't possible together with the held highlight.) */
    .layer-activator {
        fill: #c8860a;
        font-weight: bold;
    }

parse_config:
  # Mark ALL key sequences that reach a layer as "held" (amber), not just the
  # first. Symbol is reachable from the left thumb, so this keeps highlights
  # consistent with go60.
  mark_alternate_layer_activators: true
  # NOTE: keys listed in raw_binding_map are NOT auto-detected as layer
  # activators, so they would lose the "held" highlight on the target layer.
  # Leave momentary activators (&mo LAYER_Symbol / &mo LAYER_Nav) OUT of this
  # map so keymap-drawer marks them amber on the Symbol/Nav layers.
  raw_binding_map:
    # --- Custom behaviors that the parser can't trace; label them manually ---
    "&keypad_td": Keypad
    "&to LAYER_Base": Base
    # --- Magic / firmware ---
    "&bt_0": BT 0
    "&bt_1": BT 1
    "&bt_2": BT 2
    "&bt_3": BT 3
    "&out OUT_USB": USB Out
    "&bootloader": Bootloader
    "&sys_reset": Reset
    "&bt BT_CLR": BT Clear
    "&bt BT_CLR_ALL": BT Clear All
    # Clipboard (macOS Cmd)
    "&kp LG(Z)": Undo
    "&kp LG(X)": Cut
    "&kp LG(C)": Copy
    "&kp LG(V)": Paste
    "&kp LG(LS(V))": Paste Match
    # Mouse on Nav layer
    "&mkp LCLK": Left Click
    "&mkp RCLK": Right Click
    "&mkp MCLK": Middle Click
    "&mmv MOVE_UP": Mouse Up
    "&mmv MOVE_DOWN": Mouse Down
    "&mmv MOVE_LEFT": Mouse Left
    "&mmv MOVE_RIGHT": Mouse Right
    "&msc SCRL_UP": Scroll Up
    # Navigation layer (macOS)
    "&kp LC(LS(TAB))": Prev Tab
    "&kp LC(TAB)": Next Tab
    "&kp LG(LBKT)": Browser Back
    "&kp LG(RBKT)": Browser Fwd
    "&select_word_back": Select Word Back
    "&select_word": Select Word
    "&select_line": Select Line
    "&search_selected": Search Selected
    "&kp LC(LG(LS(N4)))": Copy Area Screenshot
    "&kp LC(LG(LS(N3)))": Copy Screenshot
    "&kp LG(F)": Find
    "&kp LG(LS(G))": Find Prev
    "&kp LG(G)": Find Next
