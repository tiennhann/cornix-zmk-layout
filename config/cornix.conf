# Mitigate stuck/infinite-repeating keys on Cornix (aluminum split + BLE).
#
# Symptom: after typing for a while, any key can get "stuck" and the host
# repeats it forever until power-cycle / reconnect. Classic ZMK cause is a
# dropped key-*release* packet between the peripheral (right) and central
# (left), or between the keyboard and the host — the OS never sees the release
# and starts key-repeat. Cornix's CNC aluminum case attenuates BLE, which makes
# this more likely. See:
#   https://github.com/zmkfirmware/zmk/issues/281
#   https://zmk.dev/docs/troubleshooting/connection-issues
#   https://zmk.dev/docs/features/debouncing
#
# Flash BOTH halves after changing this file. If issues persist, flash
# settings_reset to both sides, then re-flash firmware and re-pair.

# Max BLE transmit power on both halves (left board defconfig already had this;
# right did not — peripheral→central releases are the usual failure mode).
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Prefer 1M PHY over 2M. More robust through metal / with flaky host chipsets
# (Intel/Realtek Windows, older Macs). Slightly lower throughput, much more
# reliable for key state notifications.
CONFIG_BT_CTLR_PHY_2M=n

# ZMK experimental connection parameters: more stable split + host links.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Longer debounce so contact bounce / hotswap chatter can't look like a held key.
# Default is 5ms; release is the important one for "stuck" symptoms.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=15

# Larger split event queues so fast typing doesn't drop press/release events
# when the BLE link is briefly busy.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=16
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_POSITION_QUEUE_SIZE=16

# Split half reconnection (central=left, peripheral=right):
#
# When you power-cycle the LEFT, the right still thinks it is connected until
# the BLE supervision timeout fires, so it is not advertising. The left boots,
# scans, finds nothing, and you have to power-cycle left again after the right
# finally starts advertising. Power-cycling only the RIGHT works because the
# left stays up and keeps scanning.
#
# Defaults: latency=30, timeout=400 (4s). Zero latency + 1s timeout makes the
# right detect a dead left quickly and resume advertising in time for the
# left's first scan. Timeout unit is 10ms (100 => 1s). Applied on central only.
# https://zmk.dev/docs/config/split
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=100

# Power management: idle only (no deep sleep).
#
# Deep sleep (CONFIG_ZMK_SLEEP) disconnects BLE and calls sys_poweroff(). On split
# keyboards the LEFT (central) often fails to wake on keypress when ZMK Studio is
# enabled — you have to power-cycle the left half. See zmk#3195, zmk#3207.
# Stock Cornix also keeps BT connected during sleep (idle-like), not full power-off.
#
# Idle: after 30s inactive, scan rate drops but BT stays connected; any key wakes
# immediately. https://zmk.dev/docs/features/low-power-states
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Windows often caches the first battery % and never asks for updates (zmk#392).
# Disabling GATT subscription enforcement lets BAS notifications reach Windows.
# https://zmk.dev/docs/config/bluetooth
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n