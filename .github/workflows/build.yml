name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    # Without an explicit branches filter, tags-ignore alone makes GitHub treat
    # this as a tags-only workflow — so pushes to main never run the build.
    branches:
      - "**"
    paths:
      - "boards/**"
      - "config/**"
      - "modules/**"
      - "build.yaml"
      - ".github/workflows/build.yml"
    tags-ignore:
      - "*"

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main