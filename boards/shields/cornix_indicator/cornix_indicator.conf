## WS2812 indicator LEDs (2 per half), driven over SPI
CONFIG_SPI=y
CONFIG_WS2812_STRIP=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_WS2812=y
CONFIG_RGBLED_WIDGET_LED_COUNT=2

# LED 0 = battery, LED 1 = connection (stock Cornix layout)
CONFIG_RGBLED_WIDGET_SPATIAL_MAPPING=y
CONFIG_RGBLED_WIDGET_BATTERY_LED_INDEX=0
CONFIG_RGBLED_WIDGET_CONN_LED_INDEX=1

# Low brightness — indicators only, saves battery
CONFIG_RGBLED_WIDGET_BRIGHTNESS=40

# Battery + connection only; skip layer blink/sharing to reduce CPU and LED updates
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=n
CONFIG_RGBLED_WIDGET_LED_SHARING=n
CONFIG_RGBLED_WIDGET_ANIMATIONS=n

# Cyan when USB has output priority
CONFIG_RGBLED_WIDGET_CONN_SHOW_USB=y
